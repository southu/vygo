name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Install, lint, typecheck, build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: Setup Node.js (active LTS)
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Clean install (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Secret scan
        run: pnpm secret-scan

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Typecheck
        run: pnpm typecheck

      - name: Generate readiness report
        env:
          READINESS_ASSUME_CHECKS: passed
          READINESS_CLEAN_INSTALL: passed
          READINESS_LINT: passed
          READINESS_FORMAT_CHECK: passed
          READINESS_TYPECHECK: passed
          READINESS_BASELINE_BUILD: passed
          COMMIT_SHA: ${{ github.sha }}
          GITHUB_SHA: ${{ github.sha }}
        run: pnpm readiness -- --assume-passed

      - name: Baseline build
        env:
          READINESS_ASSUME_CHECKS: passed
          COMMIT_SHA: ${{ github.sha }}
          GITHUB_SHA: ${{ github.sha }}
        run: pnpm build
