# Railway config-as-code for the API service (project `vygo`).
#
# This root file is the DEFAULT service config. The worker is a SEPARATE Railway
# service that points its config path at deploy/railway/worker/railway.toml
# (Service → Settings → Config-as-code). Both build from the same root
# Dockerfile; only the start command and healthcheck differ.
#
# Migrations are a one-off run before serving traffic, not part of start:
#   DATABASE_URL=… pnpm db:migrate
# See docs/deployment.md and deploy/railway/README.md.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Both Railway services (api + worker) share this root config and the same
# Dockerfile. Dispatch on RAILWAY_SERVICE_NAME so the worker process starts when
# the service is named "worker"; everything else (including "api") runs the API.
# Worker-specific config also lives at deploy/railway/worker/railway.toml for
# services that set Config-as-code to that path.
startCommand = "sh -c 'if [ \"${RAILWAY_SERVICE_NAME}\" = \"worker\" ]; then exec pnpm --filter @vygo/worker start; else exec pnpm --filter @vygo/api start; fi'"
# Liveness (no dependency checks). /readyz additionally verifies Postgres +
# migrations once DATABASE_URL is wired. Worker health-server also serves /healthz.
healthcheckPath = "/healthz"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
